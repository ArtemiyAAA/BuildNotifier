name=BuildNotifier Plugin

# Settings
BuildNotifier.settings.title=BuildNotifier Settings
BuildNotifier.settings.enableBuildNotifications.checkbox.text=Enable build notifications
BuildNotifier.settings.showBalloonNotification.checkbox.text=Show balloon notification in IDE
BuildNotifier.settings.notifyOnlyOnLongBuilds.checkbox.text=Notify only for long builds
BuildNotifier.settings.longBuildThreshold.label.text=Long build threshold (minutes)
BuildNotifier.settings.webhookUrl.label.text=Webhook URL (for external IM integration)
BuildNotifier.settings.webhookPayloadTemplate.label.text=Webhook payload template
BuildNotifier.settings.webhookPayloadTemplate.hint.text=<html>Variables: <code>${status}</code>, <code>${status_emoji}</code>, <code>${project}</code>, <code>${duration}</code>, <code>${duration_ms}</code>, <code>${errors}</code>, <code>${timestamp}</code></html>

# Notification messages
BuildNotifier.notification.group.name=BuildNotifier Build Notifications
BuildNotifier.notification.build.success.title=Build succeeded
BuildNotifier.notification.build.success.content=Build completed in {0}
BuildNotifier.notification.build.failed.title=Build failed
BuildNotifier.notification.build.failed.content=Build failed in {0} with {1} error(s)
